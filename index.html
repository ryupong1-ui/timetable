<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Prompt", sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 10px;
    }

    p {
        font-size: 20px;
        opacity: 0.8;
    }

    .loader {
        margin-top: 30px;
        border: 6px solid rgba(255,255,255,0.2);
        border-top: 6px solid #00ffd5;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin-left: auto;
        margin-right: auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

</head>

<body>

<div class="container">
    <h1>🚧 ระบบยังไม่เปิดตัว</h1>
    <p>Coming Soon... กำลังพัฒนาโดยทีมงาน HER โปรดรอสักครู่</p>
    <p>เปิดตัววันที่ 18 พฤษภาคม พ.ศ. 2569</p>
    
    <div class="loader"></div>
</div>

</body>
</html>
