<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Checker by Ryu XP</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    text-align: center;
    padding: 10px;
}
.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
}
select, button, input {
    padding: 12px;
    margin: 5px;
    width: 100%;
    font-size: 16px;
}
button {
    background: #007bff;
    color: white;
    border-radius: 8px;
    border: none;
}
.correct { color: green; }
.wrong { color: red; }

.list {
    text-align: left;
    background: #f7f7f7;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}

.done {
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginBox" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#eef2f7;display:flex;justify-content:center;align-items:center;z-index:9999;">
    <div style="background:white;padding:20px;border-radius:12px;width:300px;">
        <h3>ระบบยังไม่เปิดใช้งาน<br>ระบบจะเปิดใช้งานในวันที่ 18 พฤษภาคม พ.ศ.2569<br>🔐 ใส่รหัสผ่านสำหรับทีมงาน HER</h3>
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button onclick="checkLogin()">เข้าสู่ระบบ</button>
        <p id="loginError" style="color:red;"></p>
    </div>
</div>

<div class="container">

<button onclick="logout()" style="background:red;">🚪 ออกจากระบบ</button>

<h2>📚 Book Checker by Ryu XP<br>
ตัว Website เหมาะสำหรับคนที่จัดตารางเรียนเป็นประจำ</h2>

<select id="day" onchange="showList()">
    <option value="">-- เลือกวัน --</option>
    <option>จันทร์</option>
    <option>อังคาร</option>
    <option>พุธ</option>
    <option>พฤหัสบดี</option>
    <option>ศุกร์</option>
</select>

<div id="bookList" class="list"></div>

<button onclick="start()">📷 เริ่มสแกน</button>

<div id="reader"></div>

<h3 id="result"></h3>
<div id="status"></div>

</div>

<script>

// 🔑 เปลี่ยนรหัสตรงนี้
const PASSWORD = "supawat182556HER";

// ✅ ตรวจ login (ไม่จำค่า)
function checkLogin() {
    const input = document.getElementById("password").value;

    if (input === PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
    } else {
        document.getElementById("loginError").innerText = "❌ รหัสผ่านไม่ถูกต้อง";
    }
}

// 🚪 logout (รีโหลดแล้วล็อกทันที)
function logout() {
    location.reload();
}


// ================== SYSTEM เดิม ==================

const CONFIG = {
    "จันทร์": {
        add: [
            { code: "9786160551705", name: "คอมพิวเตอร์" }
        ],
        remove: [
            { code: "9786160551651", name: "คณิตศาสตร์ เล่ม 1" },
            { code: "9786160551590", name: "สังคม" }
        ]
    },

    "อังคาร": {
        add: [
            { code: "9786160551651", name: "คณิตศาสตร์ เล่ม 1" },
            { code: "9198893462005", name: "New Frontiers อังกฤษ"},
            { code: "9786160551590", name: "สังคม"}
        ],
        remove: [
            { code: "9786160551705", name: "คอมพิวเตอร์" }
        ]
    },

    "พุธ": {
        add: [
            { code: "", name: "ดนตรี" },
            { code: "", name: "สุขศึกษา" }
        ],
        remove: [
            { code: "9786160551590", name: "สังคม"}
        ]
    },

    "พฤหัสบดี": {
        add: [
            { code: "", name: "ภาษาไทย" },
            { code: "9786160551590", name: "สังคม"}
        ],
        remove: [
            { code: "9786160551651", name: "คณิตศาสตร์ เล่ม 1" }
        ]
    },

    "ศุกร์": {
        add: [
            { code: "9786160551651", name: "คณิตศาสตร์ เล่ม 1" }
        ],
        remove: []
    }
}

let scanned = new Set();

function showList() {
    const day = document.getElementById("day").value;
    const config = CONFIG[day];

    if (!config) {
        document.getElementById("bookList").innerHTML = "";
        return;
    }

    let html = "<b>📥 ต้องเอาเข้า:</b><br>";
    config.add.forEach(b => {
        html += `- ${b.name}<br>`;
    });

    html += "<br><b>📤 ต้องเอาออก:</b><br>";
    config.remove.forEach(b => {
        html += `- ${b.name}<br>`;
    });

    document.getElementById("bookList").innerHTML = html;
}

function start() {
    const day = document.getElementById("day").value;
    const config = CONFIG[day];

    if (!config) {
        alert("เลือกวันก่อน");
        return;
    }

    scanned.clear();

    const scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (code) => {

            if (scanned.has(code)) return;
            scanned.add(code);

            const result = document.getElementById("result");

            let foundAdd = config.add.find(b => b.code === code);
            let foundRemove = config.remove.find(b => b.code === code);

            if (foundAdd) {
                result.innerHTML = `📥 เอาเข้า ✔ (${foundAdd.name})`;
                result.className = "correct";
            } 
            else if (foundRemove) {
                result.innerHTML = `📤 เอาออก ✔ (${foundRemove.name})`;
                result.className = "correct";
            } 
            else {
                result.innerHTML = "❌ ไม่เกี่ยว";
                result.className = "wrong";
            }

            updateStatus(config);
        }
    );
}

function updateStatus(config) {
    let html = "<b>สถานะ:</b><br>";

    config.add.forEach(b => {
        if (scanned.has(b.code)) {
            html += `<span class="done">✔ ${b.name}</span><br>`;
        } else {
            html += `⏳ ${b.name}<br>`;
        }
    });

    document.getElementById("status").innerHTML = html;
}

</script>

</body>
</html>
